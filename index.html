<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enby by NiSlp </title>
  <style>
    body {
      height: 100vh;
      width: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>

  <h2>Not in Slipstream</h2>
  <h1> Enby </h1>

  <label id="fullscreen-label" for="fullscreen">
    <input type="checkbox" id="fullscreen-checkbox" name="fullscreen">
    Fullscreen
  </label>
  <br>
  <button type="Button" onclick="demo()" id="demo-start">Start Demo</button> 
  
  <script>

    document.getElementById('fullscreen-label').addEventListener('click', (event) => {
      event.preventDefault(); //stop deafault events inside the label.
      const checkbox = document.getElementById('fullscreen-checkbox'); 
      checkbox.checked = !checkbox.checked; 
      console.log("test fullscreen label clicked?"); 
    });


    const demo = () => {
      console.log("demo");
      const checkbox = document.getElementById('fullscreen-checkbox'); 
      if (checkbox.checked) {
        document.documentElement.requestFullscreen();
        console.log("fullscreen");
      } else {
        console.log("not fullscreen");
      }
      document.body.innerHTML = '';
    }

    //🐁 Quick hack to test. Replace this with my emoji framework latter.
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const emoji = '🐁';
    canvas.width = 64;
    canvas.height = 64;
    ctx.font = '50px Arial'; // Adjust font size as needed
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, canvas.width / 2, canvas.height / 2);
    const cursorURL = canvas.toDataURL('image/png');
    document.body.style.cursor = `url('${cursorURL}'), auto`;
    


  </script>
</body>
</html>
