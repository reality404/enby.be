<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enby</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
    }

    #timelineContainer {
      height: 400px; /* Set a fixed height for the timeline container */
      background-color: purple;
    }

    #timeline {
      height: 400px; /* Set a fixed height for the timeline container */
      overflow-y: auto;

    }


    #timeline ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
      display: flex;
      position: relative;
      width: max-content;
    }

    #timeline li {
      margin: 0 10px;
      padding: 10px;
      background-color: #f0f0f0;
      border-radius: 5px;
    }

    #timeline li:first-child {
      background-color: rgba(0, 0, 255, 0.5);
      top: 0;
      position: sticky;
      z-index: 2;
    }

    #timeline li:last-child {
      bottom: 0;
      background-color: rgba(0, 0, 255, 0.5);
      position: sticky;
      margin-top: auto; 
      z-index: 2;
    }

  </style>
</head>
<body>
  <h1>Hello, World!</h1>

  <script>
    const addToList = (list, items) => {
      const ul = document.getElementById(list);
      for (let i = 0; i < items.length; i++) {
        const li = document.createElement('li');
        li.innerText = items[i];
        ul.appendChild(li);
      }
    }

    // Create the timeline container dynamically with JavaScript
    const timelineContainer = document.createElement("div");
    timelineContainer.id = "timelineContainer";
    document.body.appendChild(timelineContainer);

    const timeline = document.createElement("ul");
    timeline.id = "timeline";
    timelineContainer.appendChild(timeline);

    const generateNumberArray = (start, end) => {
      return Array.from({ length: end - start + 1 }, (_, index) => start + index);
    }

    addToList("timeline", generateNumberArray(1, 100));
  </script>
</body>
</html>
